            - heading "Introduction" [level=1] [ref=e103]
            - paragraph [ref=e104]:
              - generic [ref=e105]: A flexible, open-source, React-based UI component library built on shadcn/ui, designed to simplify Supabase-powered projects with pre-built Auth, Storage, and Realtime features.
          - generic [ref=e107]:
            - paragraph [ref=e108]: Our Supabase UI component library is a set of components built on top of the shadcn/ui registry system. It's designed to make building new or existing Supabase-powered projects faster and easier by providing pre-built solutions for common but challenging features—such as authentication, file uploads, and real-time updates.
            - paragraph [ref=e109]: "Our Supabase UI library aims to solve these issues with:"
            - list [ref=e110]:
              - listitem [ref=e111]:
                - paragraph [ref=e112]:
                  - strong [ref=e113]: Extensible components
                  - text: ": Modify and extend simple primitives as needed."
              - listitem [ref=e114]:
                - paragraph [ref=e115]:
                  - strong [ref=e116]: Composable Components
                  - text: ": Modular structure that makes components easy to integrate and combine."
              - listitem [ref=e117]:
                - paragraph [ref=e118]:
                  - strong [ref=e119]: Supabase Clients
                  - text: ": Interact with Supabase however you choose."
              - listitem [ref=e120]:
                - paragraph [ref=e121]:
                  - strong [ref=e122]: Scaffolding for Hard Problems
                  - text: ": Pre-built solutions for challenging features like sign-in/sign-up flows, file uploads, and real-time data sync."
              - listitem [ref=e123]:
                - paragraph [ref=e124]:
                  - strong [ref=e125]: New or existing projects
                  - text: ": Designed to work with brand new projects or to fit easily into existing ones."
            - heading "Link to section Extensible components" [level=3] [ref=e126]:
              - link "Link to section" [ref=e127] [cursor=pointer]:
                - /url: "#extensible-components"
                - img [ref=e128]
              - text: Extensible components
            - paragraph [ref=e131]: Our components are designed to be easily extensible. You can modify the code to fit your needs and use it as a starting point for your own components. You can change any of the code to fit your needs and use it as a starting point for your own components. The important part is that the code is designed to make the hard parts easy, and leave the easy parts for you.
            - heading "Link to section Composable components" [level=3] [ref=e132]:
              - link "Link to section" [ref=e133] [cursor=pointer]:
                - /url: "#composable-components"
                - img [ref=e134]
              - text: Composable components
            - paragraph [ref=e137]: Our components are designed to be easily composable. You can combine them to create new components that are tailored to your needs. If you want to change the design or behavior of a component, you can easily do so in your own codebase.
            - heading "Link to section Supabase clients" [level=3] [ref=e138]:
              - link "Link to section" [ref=e139] [cursor=pointer]:
                - /url: "#supabase-clients"
                - img [ref=e140]
              - text: Supabase clients
            - paragraph [ref=e143]: The Supabase clients are the backbone of your apps. They are designed to be easily integrated with your existing Supabase project. We provide both client-side and server-side clients for several major frameworks, and the code is designed to be easily integrated with your existing codebase.
            - heading "Link to section Scaffolding for hard problems" [level=3] [ref=e144]:
              - link "Link to section" [ref=e145] [cursor=pointer]:
                - /url: "#scaffolding-for-hard-problems"
                - img [ref=e146]
              - text: Scaffolding for hard problems
            - paragraph [ref=e149]: Setting up something like Auth should be easy, so we've done the hard work for you. Our components are designed to be easily integrated with your new or existing Supabase projects. Installing them drops the files into place so you can get the hard parts out of the way quickly.
